version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8080"
    environment:
      - ENV=dev

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend/app:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NODE_NO_WARNINGS=1
    command: sh -c "npm install --no-fund --no-audit && npx update-browserslist-db@latest --yes && npm start"
