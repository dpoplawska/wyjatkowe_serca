version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8080"
    environment:
      - ENV=dev

  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./frontend/app:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm start"
